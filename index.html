<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="dashboard-header">

        <div>
            <h1>Task Management Dashboard</h1>
            <p class="dashboard-subtitle">
                Organize, prioritize and track your work efficiently
            </p>
        </div>

        <button id="themeToggle" class="theme-btn">
            🌙 Dark Mode
        </button>

    </div>

    <div class="stats">

        <div class="card">
            <h2 id="totalTasks">0</h2>
            <p>Today's Tasks</p>
        </div>

        <div class="card">
            <h2 id="completedTasks">0</h2>
            <p>Completed Today</p>
        </div>

        <div class="card">
            <h2 id="pendingTasks">0</h2>
            <p>Pending Today</p>
        </div>

    </div>

    <div class="input-group">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter Task"
        >

        <input
            type="date"
            id="taskDate"
        >

        <div class="time-group">

            <select id="taskTime">

                <option value="">Time</option>

                <option>01:00</option>
                <option>01:15</option>
                <option>01:30</option>
                <option>01:45</option>

                <option>02:00</option>
                <option>02:15</option>
                <option>02:30</option>
                <option>02:45</option>

                <option>03:00</option>
                <option>03:15</option>
                <option>03:30</option>
                <option>03:45</option>

                <option>04:00</option>
                <option>04:15</option>
                <option>04:30</option>
                <option>04:45</option>

                <option>05:00</option>
                <option>05:15</option>
                <option>05:30</option>
                <option>05:45</option>

                <option>06:00</option>
                <option>06:15</option>
                <option>06:30</option>
                <option>06:45</option>

                <option>07:00</option>
                <option>07:15</option>
                <option>07:30</option>
                <option>07:45</option>

                <option>08:00</option>
                <option>08:15</option>
                <option>08:30</option>
                <option>08:45</option>

                <option>09:00</option>
                <option>09:15</option>
                <option>09:30</option>
                <option>09:45</option>

                <option>10:00</option>
                <option>10:15</option>
                <option>10:30</option>
                <option>10:45</option>

                <option>11:00</option>
                <option>11:15</option>
                <option>11:30</option>
                <option>11:45</option>

                <option>12:00</option>
                <option>12:15</option>
                <option>12:30</option>
                <option>12:45</option>

            </select>

            <select id="taskPeriod">
                <option value="">AM / PM</option>
                <option>AM</option>
                <option>PM</option>
            </select>

        </div>

        <select id="taskPriority">
            <option value="High">🔴 High</option>
            <option value="Medium" selected>🟡 Medium</option>
            <option value="Low">🟢 Low</option>
        </select>

        <button onclick="addTask()">
            Add Task
        </button>

    </div>

    <div class="task-sections">

        <h2 class="section-title">
            Today's Tasks
        </h2>

        <ul id="todayTasks"></ul>

        <h2 class="section-title">
            Upcoming Tasks
        </h2>

        <ul id="upcomingTasks"></ul>

        <h2 class="section-title">
            Past Tasks
        </h2>

        <ul id="pastTasks"></ul>

    </div>

    <div class="history-button-container">

        <button
            class="history-btn"
            onclick="window.location.href='history.html'"
        >
            📜 View Task History
        </button>

    </div>

</div>

<script src="script.js" defer></script>

</body>
</html>
