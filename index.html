<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Task Management Dashboard</h1>

    <div class="stats">

        <div class="card">
            <h2 id="totalTasks">0</h2>
            <p>Today's Tasks</p>
        </div>

        <div class="card">
            <h2 id="completedTasks">0</h2>
            <p>Completed Today</p>
        </div>

        <div class="card">
            <h2 id="pendingTasks">0</h2>
            <p>Pending Today</p>
        </div>

    </div>

    <div class="input-group">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter Task"
        >

        <input
            type="date"
            id="taskDate"
        >

        <button onclick="addTask()">
            Add Task
        </button>

    </div>

    <div class="task-sections">

        <h2 class="section-title">Today's Tasks</h2>
        <ul id="todayTasks"></ul>

        <h2 class="section-title">Upcoming Tasks</h2>
        <ul id="upcomingTasks"></ul>

        <h2 class="section-title">Previous Tasks</h2>
        <ul id="pastTasks"></ul>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
