<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="dashboard-header">

        <div>
            <h1>Task Management Dashboard</h1>

            <p class="dashboard-subtitle">
                Organize, prioritize and track your work efficiently
            </p>
        </div>

        <button id="themeToggle" class="theme-btn">
            🌙 Dark Mode
        </button>

    </div>

    <div class="stats">

        <div class="card">
            <h2 id="totalTasks">0</h2>
            <p>Today's Tasks</p>
        </div>

        <div class="card">
            <h2 id="completedTasks">0</h2>
            <p>Completed Today</p>
        </div>

        <div class="card">
            <h2 id="pendingTasks">0</h2>
            <p>Pending Today</p>
        </div>

    </div>

    <div class="input-group">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter Task"
        >

        <input
            type="date"
            id="taskDate"
            min=""
        >

        <div class="time-group">
            <div class="time-box time-input-box">
                <input
                    type="text"
                    id="taskHour"
                    placeholder="H"
                    inputmode="numeric"
                    maxlength="2"
                    pattern="[0-9]{1,2}"
                    list="taskHourOptions"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                >
                <datalist id="taskHourOptions">
                    <option value="1"></option>
                    <option value="2"></option>
                    <option value="3"></option>
                    <option value="4"></option>
                    <option value="5"></option>
                    <option value="6"></option>
                    <option value="7"></option>
                    <option value="8"></option>
                    <option value="9"></option>
                    <option value="10"></option>
                    <option value="11"></option>
                    <option value="12"></option>
                </datalist>
            </div>

            <div class="time-box time-input-box">
                <input
                    type="text"
                    id="taskMinute"
                    placeholder="M"
                    inputmode="numeric"
                    maxlength="2"
                    pattern="[0-9]{1,2}"
                    list="taskMinuteOptions"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                >
                <datalist id="taskMinuteOptions">
                    <option value="1"></option>
                    <option value="2"></option>
                    <option value="3"></option>
                    <option value="4"></option>
                    <option value="5"></option>
                    <option value="6"></option>
                    <option value="7"></option>
                    <option value="8"></option>
                    <option value="9"></option>
                    <option value="10"></option>
                    <option value="11"></option>
                    <option value="12"></option>
                    <option value="13"></option>
                    <option value="14"></option>
                    <option value="15"></option>
                    <option value="16"></option>
                    <option value="17"></option>
                    <option value="18"></option>
                    <option value="19"></option>
                    <option value="20"></option>
                    <option value="21"></option>
                    <option value="22"></option>
                    <option value="23"></option>
                    <option value="24"></option>
                    <option value="25"></option>
                    <option value="26"></option>
                    <option value="27"></option>
                    <option value="28"></option>
                    <option value="29"></option>
                    <option value="30"></option>
                    <option value="31"></option>
                    <option value="32"></option>
                    <option value="33"></option>
                    <option value="34"></option>
                    <option value="35"></option>
                    <option value="36"></option>
                    <option value="37"></option>
                    <option value="38"></option>
                    <option value="39"></option>
                    <option value="40"></option>
                    <option value="41"></option>
                    <option value="42"></option>
                    <option value="43"></option>
                    <option value="44"></option>
                    <option value="45"></option>
                    <option value="46"></option>
                    <option value="47"></option>
                    <option value="48"></option>
                    <option value="49"></option>
                    <option value="50"></option>
                    <option value="51"></option>
                    <option value="52"></option>
                    <option value="53"></option>
                    <option value="54"></option>
                    <option value="55"></option>
                    <option value="56"></option>
                    <option value="57"></option>
                    <option value="58"></option>
                    <option value="59"></option>
                </datalist>
            </div>

            <div class="time-box time-period-box">
                <select id="taskPeriod" class="time-select">
                    <option value="" selected>AM/PM</option>
                    <option value="AM">AM</option>
                    <option value="PM">PM</option>
                </select>
            </div>
        </div>

        <select id="taskPriority">
            <option value="High">🔴 High</option>
            <option value="Medium" selected>🟡 Medium</option>
            <option value="Low">🟢 Low</option>
        </select>

        <button onclick="addTask()">
            Add Task
        </button>

    </div>

    <div class="task-sections">

        <div class="section-card">
            <h2 class="section-title">Today's Tasks</h2>
            <ul id="todayTasks"></ul>
        </div>

        <div class="section-card">
            <h2 class="section-title">Upcoming Tasks</h2>
            <ul id="upcomingTasks"></ul>
        </div>

        <div class="section-card">
            <h2 class="section-title">Past Tasks</h2>
            <ul id="pastTasks"></ul>
        </div>

    </div>

    <div class="history-button-container">

        <button
            class="history-btn"
            onclick="window.location.href='history.html'"
        >
            📜 View Task History
        </button>

    </div>

    <div id="editModal" class="modal hidden">
        <div class="modal-content">
            <h3>Edit Task</h3>
            <form id="editTaskForm">
                <label for="editTaskInput">Task Name</label>
                <input type="text" id="editTaskInput" placeholder="Enter Task">

                <label for="editTaskDate">Date</label>
                <input type="date" id="editTaskDate">

                <label>Time</label>
                <div class="edit-time-group">
                    <div class="time-box time-input-box">
                        <input
                            type="text"
                            id="editTaskHour"
                            placeholder="H"
                            inputmode="numeric"
                            maxlength="2"
                            pattern="[0-9]{1,2}"
                            list="editTaskHourOptions"
                            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                        >
                        <datalist id="editTaskHourOptions">
                            <option value="1"></option>
                            <option value="2"></option>
                            <option value="3"></option>
                            <option value="4"></option>
                            <option value="5"></option>
                            <option value="6"></option>
                            <option value="7"></option>
                            <option value="8"></option>
                            <option value="9"></option>
                            <option value="10"></option>
                            <option value="11"></option>
                            <option value="12"></option>
                        </datalist>
                    </div>

                    <div class="time-box time-input-box">
                        <input
                            type="text"
                            id="editTaskMinute"
                            placeholder="M"
                            inputmode="numeric"
                            maxlength="2"
                            pattern="[0-9]{1,2}"
                            list="editTaskMinuteOptions"
                            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                        >
                        <datalist id="editTaskMinuteOptions">
                            <option value="1"></option>
                            <option value="2"></option>
                            <option value="3"></option>
                            <option value="4"></option>
                            <option value="5"></option>
                            <option value="6"></option>
                            <option value="7"></option>
                            <option value="8"></option>
                            <option value="9"></option>
                            <option value="10"></option>
                            <option value="11"></option>
                            <option value="12"></option>
                            <option value="13"></option>
                            <option value="14"></option>
                            <option value="15"></option>
                            <option value="16"></option>
                            <option value="17"></option>
                            <option value="18"></option>
                            <option value="19"></option>
                            <option value="20"></option>
                            <option value="21"></option>
                            <option value="22"></option>
                            <option value="23"></option>
                            <option value="24"></option>
                            <option value="25"></option>
                            <option value="26"></option>
                            <option value="27"></option>
                            <option value="28"></option>
                            <option value="29"></option>
                            <option value="30"></option>
                            <option value="31"></option>
                            <option value="32"></option>
                            <option value="33"></option>
                            <option value="34"></option>
                            <option value="35"></option>
                            <option value="36"></option>
                            <option value="37"></option>
                            <option value="38"></option>
                            <option value="39"></option>
                            <option value="40"></option>
                            <option value="41"></option>
                            <option value="42"></option>
                            <option value="43"></option>
                            <option value="44"></option>
                            <option value="45"></option>
                            <option value="46"></option>
                            <option value="47"></option>
                            <option value="48"></option>
                            <option value="49"></option>
                            <option value="50"></option>
                            <option value="51"></option>
                            <option value="52"></option>
                            <option value="53"></option>
                            <option value="54"></option>
                            <option value="55"></option>
                            <option value="56"></option>
                            <option value="57"></option>
                            <option value="58"></option>
                            <option value="59"></option>
                        </datalist>
                    </div>
                            
                    <div class="time-box time-period-box">
                        <select id="editTaskPeriod" class="time-select">
                            <option value="">AM/PM</option>
                            <option value="AM">AM</option>
                            <option value="PM">PM</option>
                        </select>
                    </div>
                </div>

                <label for="editTaskPriority">Priority</label>
                <select id="editTaskPriority">
                    <option value="High">🔴 High</option>
                    <option value="Medium">🟡 Medium</option>
                    <option value="Low">🟢 Low</option>
                </select>

                <div class="modal-actions">
                    <button type="button" class="cancel-btn" id="cancelEditBtn">Cancel</button>
                    <button type="submit" class="save-btn" id="saveEditBtn">Save</button>
                </div>
            </form>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
